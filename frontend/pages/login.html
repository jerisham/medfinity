<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in · Medfinity</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <div class="auth">
    <div class="auth__card">
      <div class="auth__mark">M</div>
      <h1>Welcome back</h1>
      <p class="sub">Log in to pick up where you left off.</p>

      <div class="form-error" id="loginError"></div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn--primary btn--block" type="submit" id="loginBtn">Log in</button>
      </form>

      <div class="auth__footer">New to Medfinity? <a href="register.html">Create an account</a></div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
