<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account · Medfinity</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <div class="auth">
    <div class="auth__card" style="max-width:480px;">
      <div class="auth__mark">M</div>
      <h1>Create your account</h1>
      <p class="sub">Care, coordinated in one place.</p>

      <div class="form-error" id="registerError"></div>

      <form id="registerForm">
        <div class="field-row">
          <div class="field">
            <label for="first_name">First name</label>
            <input id="first_name" name="first_name" required>
          </div>
          <div class="field">
            <label for="last_name">Last name</label>
            <input id="last_name" name="last_name" required>
          </div>
        </div>
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required>
        </div>
        <div class="field">
          <label for="user_type">I am a</label>
          <select id="user_type" name="user_type">
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
            <option value="pharmacist">Pharmacist</option>
          </select>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required>
        </div>
        <button class="btn btn--primary btn--block" type="submit" id="registerBtn">Create account</button>
      </form>

      <div class="auth__footer">Already have an account? <a href="login.html">Log in</a></div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
